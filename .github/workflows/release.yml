name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle Python sidecar
        run: |
          pyinstaller --onefile --name meetai-backend backend/server.py
          echo "Python sidecar built"

      - name: Install Node dependencies
        run: npm ci

      - name: Validate signing secrets
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)) {
            Write-Error "WIN_CSC_LINK secret is required for signed Windows releases."
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_KEY_PASSWORD)) {
            Write-Error "WIN_CSC_KEY_PASSWORD secret is required for signed Windows releases."
            exit 1
          }

      - name: Build Electron app
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --win --publish always

      - name: Verify artifact exists
        shell: pwsh
        run: |
          if (!(Test-Path "dist\*.exe")) {
            Write-Error "No .exe found in dist/ - build failed"
            exit 1
          }
          Get-ChildItem dist\*.exe | Select-Object Name, Length

      - name: Upload release notes
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
